services:
  budge:
    image: 'lscr.io/linuxserver/budge:latest'
    environment:
      - SERVICE_URL_BUDGE
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - 'budge-config:/config'
    ports:
      - '2000:80'
      - '2001:443'
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://127.0.0.1:80'
      interval: 2s
      timeout: 10s
      retries: 15
